<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#e8f1fb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#081726" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pesos">
<meta name="description" content="Conversor de pesos argentinos a USD y EUR con cotización en vivo.">
<title>Pesos · ARS → USD / EUR</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2374ACDF'/%3E%3Cpath d='M50 20l6.5 13.2 14.6 2.1-10.5 10.3 2.5 14.5L50 63.3 36.4 60.4l2.5-14.5-10.5-10.3 14.6-2.1z' fill='%23F6B40E'/%3E%3C/svg%3E">
<style>
  /* ---------- theme tokens ---------- */
  :root, :root[data-theme="light"]{
    --celeste:#74ACDF;
    --celeste-soft:#9ec9ee;
    --celeste-deep:#2f7ec0;
    --gold:#F6B40E;
    --gold-soft:#ffd257;

    --bg:#e8f1fb;
    --bg-2:#dceaf6;
    --glow:var(--celeste-soft);
    --surface:#ffffff;
    --surface-2:#f3f8fd;
    --surface-key:#ffffff;
    --stroke:rgba(16,52,84,0.08);
    --stroke-strong:rgba(16,52,84,0.14);

    --ink:#0c2338;
    --ink-2:#375068;
    --ink-3:#6f889c;
    --accent-strong:var(--celeste-deep);

    --usd:#12805c;
    --usd-tint:rgba(18,128,92,0.10);
    --eur:#3f57c9;
    --eur-tint:rgba(63,87,201,0.10);

    --shadow-sm:0 1px 2px rgba(11,30,56,.06), 0 2px 6px rgba(11,30,56,.06);
    --shadow-md:0 6px 18px rgba(11,30,56,.10), 0 2px 6px rgba(11,30,56,.06);
    --shadow-lg:0 18px 42px rgba(11,30,56,.18), 0 6px 14px rgba(11,30,56,.10);

    --r-lg:24px;
    --r-md:18px;
    --r-sm:14px;
    --ease:cubic-bezier(.22,.61,.36,1);
    --pop:cubic-bezier(.34,1.56,.64,1);
  }

  @media (prefers-color-scheme: dark){ :root:not([data-theme]){
    --bg:#081726; --bg-2:#040e19; --glow:rgba(47,126,192,.42);
    --surface:#0f2739; --surface-2:#122e43; --surface-key:#16344b;
    --stroke:rgba(255,255,255,0.07); --stroke-strong:rgba(255,255,255,0.13);
    --ink:#eaf3fc; --ink-2:#a9c1d6; --ink-3:#7a95ac; --accent-strong:var(--celeste-soft);
    --usd:#3fd39a; --usd-tint:rgba(63,211,154,0.12); --eur:#8ea0ff; --eur-tint:rgba(142,160,255,0.14);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 8px 22px rgba(0,0,0,.45); --shadow-lg:0 22px 50px rgba(0,0,0,.55);
  } }
  :root[data-theme="dark"]{
    --bg:#081726; --bg-2:#040e19; --glow:rgba(47,126,192,.42);
    --surface:#0f2739; --surface-2:#122e43; --surface-key:#16344b;
    --stroke:rgba(255,255,255,0.07); --stroke-strong:rgba(255,255,255,0.13);
    --ink:#eaf3fc; --ink-2:#a9c1d6; --ink-3:#7a95ac; --accent-strong:var(--celeste-soft);
    --usd:#3fd39a; --usd-tint:rgba(63,211,154,0.12); --eur:#8ea0ff; --eur-tint:rgba(142,160,255,0.14);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 8px 22px rgba(0,0,0,.45); --shadow-lg:0 22px 50px rgba(0,0,0,.55);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;touch-action:manipulation;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:var(--bg);
    min-height:100dvh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    touch-action:pan-y;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
  }
  .app{
    position:relative;
    min-height:100dvh;
    max-width:460px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 8px) 15px calc(env(safe-area-inset-bottom) + 12px);
    isolation:isolate;
  }

  .aura{position:fixed;inset:0;z-index:-2;background:
      radial-gradient(120% 68% at 50% -8%, var(--glow) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);}

  /* ---------- top bar (theme toggle only) ---------- */
  .topbar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:10px;min-height:40px;}
  .icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--stroke);background:var(--surface);color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-sm);
    transition:transform .14s var(--pop),background .2s;}
  .icon-btn:active{transform:scale(.9);}
  .icon-btn svg{width:20px;height:20px;}

  /* ---------- editable field: shared ---------- */
  .field{cursor:pointer;transition:box-shadow .2s var(--ease),border-color .2s ease;}
  .field.active{border-color:transparent;}

  /* ---------- amount card ---------- */
  .amount-card{
    background:var(--surface);
    border:1px solid var(--stroke);
    border-radius:var(--r-lg);
    box-shadow:var(--shadow-lg);
    padding:12px 18px 13px;
  }
  .amount-card.active{box-shadow:var(--shadow-lg), inset 0 0 0 2px var(--accent-strong);}
  .amount-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .amount-head .label{display:flex;align-items:center;gap:8px;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);}
  .sol-dot{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold));box-shadow:0 0 0 3px rgba(246,180,14,.18);}
  .amount-head .badge{font-size:.64rem;font-weight:700;color:var(--accent-strong);background:var(--surface-2);border:1px solid var(--stroke);padding:3px 9px;border-radius:999px;}

  .amount-row{display:flex;align-items:baseline;gap:6px;min-height:52px;}
  .amount-row .sym{font-size:1.7rem;font-weight:700;color:var(--ink-3);flex:none;}
  #amountDisplay{
    font-size:3rem;font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--ink);
    font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;flex:1;min-width:0;
  }
  #amountDisplay.empty{color:var(--ink-3);opacity:.45;}
  .caret{display:inline-block;width:2.5px;height:.9em;vertical-align:-2px;margin-left:2px;background:var(--accent-strong);border-radius:2px;animation:blink 1.1s steps(1) infinite;transform:translateY(.06em);}
  @keyframes blink{50%{opacity:0;}}
  .clear-btn{flex:none;align-self:center;width:36px;height:36px;border-radius:50%;border:1px solid var(--stroke);background:var(--surface-2);color:var(--ink-3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s var(--pop),background .2s,color .2s;}
  .clear-btn svg{width:17px;height:17px;}
  .clear-btn:active{transform:scale(.86);background:var(--surface);color:var(--ink-2);}
  .clear-btn[hidden]{display:none;}

  /* ---------- segmented control ---------- */
  .seg{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin:12px 3px 0;background:var(--surface-2);border:1px solid var(--stroke);border-radius:999px;padding:4px;box-shadow:var(--shadow-sm);}
  .seg .pill{position:absolute;top:4px;bottom:4px;left:4px;width:calc(25% - 3px);background:var(--surface);border-radius:999px;box-shadow:var(--shadow-sm);transition:transform .32s var(--ease);z-index:0;}
  .seg button{position:relative;z-index:1;border:none;background:none;padding:7px 0;font-size:.79rem;font-weight:700;color:var(--ink-3);cursor:pointer;border-radius:999px;transition:color .2s ease;}
  .seg button.active{color:var(--accent-strong);}

  /* ---------- results ---------- */
  .results{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px;}
  .rc{position:relative;background:var(--surface);border:1px solid var(--stroke);border-radius:var(--r-md);box-shadow:var(--shadow-md);padding:12px 13px 11px;overflow:hidden;}
  .rc.active{box-shadow:var(--shadow-md), inset 0 0 0 2px var(--accent-strong);}
  .rc::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--accentc);opacity:.9;}
  .rc.usd{--accentc:var(--usd);}
  .rc.eur{--accentc:var(--eur);}
  .rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:800;letter-spacing:.02em;padding:4px 9px 4px 7px;border-radius:999px;}
  .rc.usd .chip{color:var(--usd);background:var(--usd-tint);}
  .rc.eur .chip{color:var(--eur);background:var(--eur-tint);}
  .chip .fx{font-size:1rem;line-height:1;}
  .rc .full{font-size:.6rem;font-weight:600;color:var(--ink-3);letter-spacing:.02em;}
  .rc .value{font-size:1.62rem;font-weight:800;letter-spacing:-.02em;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:clip;margin-top:2px;}
  .rc .value .cents{color:var(--ink-2);font-weight:700;}
  .rc .sub{margin-top:7px;padding-top:7px;border-top:1px dashed var(--stroke-strong);display:flex;flex-direction:column;gap:2px;}
  .rc .rate{font-size:.66rem;font-weight:700;color:var(--ink-2);font-variant-numeric:tabular-nums;}
  .rc .spread{font-size:.58rem;color:var(--ink-3);font-variant-numeric:tabular-nums;}

  /* ---------- status ---------- */
  .status{display:flex;align-items:center;justify-content:center;gap:7px;margin:11px 0 0;font-size:.66rem;font-weight:600;color:var(--ink-3);}
  .status .dot{width:7px;height:7px;border-radius:50%;background:#33c481;box-shadow:0 0 0 3px rgba(51,196,129,.16);}
  .status.err .dot{background:#ef5b5b;box-shadow:0 0 0 3px rgba(239,91,91,.16);}
  .status.loading .dot{background:var(--gold);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}

  /* ---------- keypad ---------- */
  .keypad-wrap{margin-top:auto;padding-top:8px;}
  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:7px;}
  .quick button{border:1px solid var(--stroke);background:var(--surface-2);color:var(--ink-2);font-size:.8rem;font-weight:700;padding:8px 0;border-radius:var(--r-sm);cursor:pointer;transition:transform .12s var(--pop),background .2s;font-variant-numeric:tabular-nums;}
  .quick button.clear{color:var(--accent-strong);}
  .quick button:active{transform:scale(.93);background:var(--surface);}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
  .key{position:relative;overflow:hidden;border:1px solid var(--stroke);background:var(--surface-key);border-radius:var(--r-sm);box-shadow:var(--shadow-sm);
    font-size:1.45rem;font-weight:700;color:var(--ink);cursor:pointer;
    min-height:clamp(44px,6.3vh,58px);display:flex;align-items:center;justify-content:center;
    transition:transform .1s var(--pop);font-variant-numeric:tabular-nums;touch-action:manipulation;user-select:none;}
  .key:active{transform:scale(.95);}
  .key.util{color:var(--ink-2);font-size:1.2rem;}
  .key svg{width:24px;height:24px;}
  .key .ripple{position:absolute;border-radius:50%;background:var(--celeste);opacity:.28;transform:translate(-50%,-50%) scale(0);pointer-events:none;animation:ripple .45s var(--ease) forwards;}
  @keyframes ripple{to{transform:translate(-50%,-50%) scale(1);opacity:0;}}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
    .caret{animation:none;}
  }
</style>
</head>
<body>
  <div class="aura"></div>

  <div class="app">
    <div class="topbar">
      <button id="themeBtn" class="icon-btn" aria-label="Cambiar tema (claro/oscuro)"></button>
    </div>

    <section class="amount-card field active" id="card-ars" data-field="ars" role="button" tabindex="0" aria-label="Editar monto en pesos">
      <div class="amount-head">
        <span class="label"><span class="sol-dot"></span> Pesos argentinos</span>
        <span class="badge">ARS</span>
      </div>
      <div class="amount-row">
        <span class="sym">$</span>
        <div id="amountDisplay" class="empty">0<span class="caret"></span></div>
        <button id="clearBtn" class="clear-btn" aria-label="Borrar todo" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
    </section>

    <nav class="seg" id="seg" aria-label="Tipo de cambio">
      <span class="pill" id="segPill"></span>
      <button data-rate="blue" class="active">Blue</button>
      <button data-rate="oficial">Oficial</button>
      <button data-rate="mep">MEP</button>
      <button data-rate="tarjeta">Tarjeta</button>
    </nav>

    <section class="results">
      <div class="rc usd field" id="card-usd" data-field="usd" role="button" tabindex="0" aria-label="Editar monto en dólares">
        <div class="rc-top">
          <span class="chip"><span class="fx">🇺🇸</span> USD</span>
        </div>
        <div class="full">Dólar estadounidense</div>
        <div class="value" id="usdVal">—</div>
        <div class="sub">
          <span class="rate" id="usdRate">cargando…</span>
          <span class="spread" id="usdSpread"></span>
        </div>
      </div>
      <div class="rc eur field" id="card-eur" data-field="eur" role="button" tabindex="0" aria-label="Editar monto en euros">
        <div class="rc-top">
          <span class="chip"><span class="fx">🇪🇺</span> EUR</span>
        </div>
        <div class="full">Euro</div>
        <div class="value" id="eurVal">—</div>
        <div class="sub">
          <span class="rate" id="eurRate">cargando…</span>
          <span class="spread" id="eurSpread"></span>
        </div>
      </div>
    </section>

    <div class="keypad-wrap">
      <div class="quick" id="quick">
        <button data-add="1000">+1K</button>
        <button data-add="10000">+10K</button>
        <button data-add="100000">+100K</button>
        <button class="clear" data-clear="1">Borrar</button>
      </div>
      <div class="keypad" id="keypad">
        <button class="key" data-k="1">1</button>
        <button class="key" data-k="2">2</button>
        <button class="key" data-k="3">3</button>
        <button class="key" data-k="4">4</button>
        <button class="key" data-k="5">5</button>
        <button class="key" data-k="6">6</button>
        <button class="key" data-k="7">7</button>
        <button class="key" data-k="8">8</button>
        <button class="key" data-k="9">9</button>
        <button class="key util" data-k=",">,</button>
        <button class="key" data-k="0">0</button>
        <button class="key util" data-k="back" aria-label="Borrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 5H8L2 12l6 7h13a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1Z"/><path d="M15 9l-4 6M11 9l4 6"/></svg>
        </button>
      </div>
    </div>

    <div class="status loading" id="status">
      <span class="dot"></span>
      <span id="statusText">Obteniendo cotización…</span>
    </div>
  </div>

<script>
(function(){
  "use strict";

  var API = {
    blue:    "https://dolarapi.com/v1/dolares/blue",
    oficial: "https://dolarapi.com/v1/dolares/oficial",
    mep:     "https://dolarapi.com/v1/dolares/bolsa",
    tarjeta: "https://dolarapi.com/v1/dolares/tarjeta",
    eur:     "https://dolarapi.com/v1/cotizaciones/eur"
  };
  var LS_KEY = "pesos_rates_v2";
  var THEME_KEY = "pesos_theme";

  // active: which field the keypad edits — "ars" | "usd" | "eur"
  // raw: the raw text of the active field.  baseArs: canonical peso amount.
  var state = { active:"ars", raw:"", baseArs:0, rateType:"blue", rates:{} };

  var el = function(id){ return document.getElementById(id); };
  var $disp = el("amountDisplay");
  var $clear = el("clearBtn");
  var $usdVal = el("usdVal"), $eurVal = el("eurVal");
  var $usdRate = el("usdRate"), $eurRate = el("eurRate");
  var $usdSpread = el("usdSpread"), $eurSpread = el("eurSpread");
  var $status = el("status"), $statusText = el("statusText");
  var $seg = el("seg"), $segPill = el("segPill");
  var $theme = el("themeBtn");

  var nfInt = new Intl.NumberFormat("es-AR");
  var nfArs = new Intl.NumberFormat("es-AR",{maximumFractionDigits:2});
  var nfMoney = new Intl.NumberFormat("es-AR",{minimumFractionDigits:2, maximumFractionDigits:2});
  var nfRate = new Intl.NumberFormat("es-AR",{minimumFractionDigits:2, maximumFractionDigits:2});

  // ---------- theme ----------
  var SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.4M12 19.6V22M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2 12h2.4M19.6 12H22M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/></svg>';
  var MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  var mq = window.matchMedia("(prefers-color-scheme: dark)");
  function effIsDark(){ var t = localStorage.getItem(THEME_KEY); return t ? t === "dark" : mq.matches; }
  function applyTheme(){
    var t = localStorage.getItem(THEME_KEY);
    if(t) document.documentElement.setAttribute("data-theme", t);
    else document.documentElement.removeAttribute("data-theme");
    $theme.innerHTML = effIsDark() ? SUN : MOON;
  }
  $theme.addEventListener("click", function(){
    localStorage.setItem(THEME_KEY, effIsDark() ? "light" : "dark");
    applyTheme(); haptic(8);
  });
  mq.addEventListener("change", function(){ if(!localStorage.getItem(THEME_KEY)) applyTheme(); });

  // ---------- numbers ----------
  function rawToNum(raw){ if(!raw) return 0; var n = parseFloat(raw.replace(/\./g,"").replace(",",".")); return isFinite(n) ? n : 0; }
  function numToRaw(n){ var s = n.toFixed(2); var p = s.split("."); return p[1] === "00" ? p[0] : p[0] + "," + p[1]; }
  function formatRaw(raw){
    if(raw === "") return "0";
    var parts = raw.split(",");
    var intN = parseInt(parts[0],10);
    var intStr = isNaN(intN) ? "0" : nfInt.format(intN);
    return parts.length > 1 ? intStr + "," + parts[1] : intStr;
  }
  function caret(){ return '<span class="caret"></span>'; }
  function splitCents(str){
    var i = str.lastIndexOf(",");
    return i === -1 ? str : str.slice(0,i) + '<span class="cents">' + str.slice(i) + '</span>';
  }

  // ---------- rates ----------
  function usdRateFor(type){ var r = state.rates[type]; return (r && r.venta) ? r : null; }
  function eurRateFor(type){
    var eur = state.rates.eur;
    if(!eur || !eur.venta) return null;
    var of = state.rates.oficial, sel = state.rates[type];
    var factor = 1;
    if(of && of.venta && sel && sel.venta) factor = sel.venta / of.venta;
    return { compra:(eur.compra||eur.venta)*factor, venta:eur.venta*factor, scaled:(type!=="oficial") };
  }
  function fieldNumeric(field){
    if(field === "ars") return state.baseArs;
    if(field === "usd"){ var u = usdRateFor(state.rateType); return u ? state.baseArs / u.venta : 0; }
    var e = eurRateFor(state.rateType); return e ? state.baseArs / e.venta : 0;
  }

  // recompute the canonical peso amount from whatever field is active
  function recomputeBase(){
    var v = rawToNum(state.raw);
    if(state.active === "ars"){ state.baseArs = v; }
    else if(state.active === "usd"){ var u = usdRateFor(state.rateType); state.baseArs = u ? v * u.venta : 0; }
    else { var e = eurRateFor(state.rateType); state.baseArs = e ? v * e.venta : 0; }
  }

  // ---------- render ----------
  function fitFont(){
    var len = $disp.textContent.replace(/[^0-9]/g,"").length;
    var size = 3;
    if(len > 14) size = 1.6; else if(len > 12) size = 1.9;
    else if(len > 10) size = 2.2; else if(len > 8) size = 2.6;
    $disp.style.fontSize = size + "rem";
  }
  function renderArs(){
    if(state.active === "ars"){
      $disp.classList.toggle("empty", state.raw === "");
      $disp.innerHTML = formatRaw(state.raw) + caret();
    } else {
      $disp.classList.toggle("empty", state.baseArs === 0);
      $disp.innerHTML = state.baseArs === 0 ? "0" : nfArs.format(state.baseArs);
    }
    fitFont();
  }
  function renderResult(field, $node, prefix, rate){
    if(state.active === field){
      $node.innerHTML = prefix + " " + formatRaw(state.raw) + caret();
    } else {
      $node.innerHTML = rate ? prefix + " " + splitCents(nfMoney.format(fieldNumeric(field))) : "—";
    }
  }
  function render(){
    var u = usdRateFor(state.rateType);
    var e = eurRateFor(state.rateType);
    renderArs();
    renderResult("usd", $usdVal, "US$", u);
    renderResult("eur", $eurVal, "€", e);
    if(u){
      $usdRate.textContent = "1 USD = $" + nfRate.format(u.venta);
      $usdSpread.textContent = "compra $" + nfRate.format(u.compra||u.venta) + " · venta $" + nfRate.format(u.venta);
    }
    if(e){
      $eurRate.textContent = "1 EUR = $" + nfRate.format(e.venta) + (e.scaled ? " *" : "");
      $eurSpread.textContent = e.scaled ? "estimado s/ mercado " + labelFor(state.rateType)
                                        : "compra $" + nfRate.format(e.compra) + " · venta $" + nfRate.format(e.venta);
    }
    el("card-ars").classList.toggle("active", state.active === "ars");
    el("card-usd").classList.toggle("active", state.active === "usd");
    el("card-eur").classList.toggle("active", state.active === "eur");
    $clear.hidden = (state.raw === "" && state.baseArs === 0);
  }
  function labelFor(t){ return ({blue:"blue",oficial:"oficial",mep:"MEP",tarjeta:"tarjeta"})[t] || t; }

  // ---------- editing ----------
  function setActive(field){
    if(state.active !== field){
      var val = fieldNumeric(field);
      state.raw = val > 0 ? numToRaw(val) : "";
      state.active = field;
      haptic(6);
    }
    render();
  }
  function press(k){
    if(k === "back"){ state.raw = state.raw.slice(0,-1); }
    else if(k === ","){
      if(state.raw.indexOf(",") === -1) state.raw = (state.raw === "" ? "0" : state.raw) + ",";
    } else {
      var parts = state.raw.split(",");
      if(parts.length > 1 && parts[1].length >= 2) return;
      if(state.raw === "0") state.raw = k;
      else if(state.raw.replace(/[^0-9]/g,"").length >= 15) return;
      else state.raw += k;
    }
    recomputeBase(); render();
  }
  function quickAdd(n){ state.raw = String(Math.floor(rawToNum(state.raw)) + n); recomputeBase(); render(); }
  function clearAll(){ state.raw = ""; state.baseArs = 0; render(); }

  function haptic(ms){ if(navigator.vibrate){ try{ navigator.vibrate(ms); }catch(e){} } }
  function ripple(btn, ev){
    var r = btn.getBoundingClientRect();
    var d = Math.max(r.width, r.height) * 1.4;
    var s = document.createElement("span");
    s.className = "ripple";
    s.style.width = s.style.height = d + "px";
    s.style.left = ((ev && ev.clientX ? ev.clientX : r.left + r.width/2) - r.left) + "px";
    s.style.top  = ((ev && ev.clientY ? ev.clientY : r.top + r.height/2) - r.top) + "px";
    btn.appendChild(s);
    setTimeout(function(){ s.remove(); }, 460);
  }

  el("keypad").addEventListener("pointerdown", function(e){
    var btn = e.target.closest(".key"); if(!btn) return;
    ripple(btn, e); haptic(8); press(btn.getAttribute("data-k"));
  });
  el("quick").addEventListener("pointerdown", function(e){
    var btn = e.target.closest("button"); if(!btn) return;
    haptic(8);
    if(btn.hasAttribute("data-clear")) clearAll();
    else quickAdd(parseInt(btn.getAttribute("data-add"),10));
  });
  $clear.addEventListener("click", function(e){ e.stopPropagation(); haptic(10); clearAll(); });

  // tap a card to make it the input
  ["card-ars","card-usd","card-eur"].forEach(function(id){
    var node = el(id);
    var pick = function(e){ if(e.target.closest("#clearBtn")) return; setActive(node.getAttribute("data-field")); };
    node.addEventListener("click", pick);
    node.addEventListener("keydown", function(e){ if(e.key === "Enter" || e.key === " "){ e.preventDefault(); pick(e); } });
  });

  window.addEventListener("keydown", function(e){
    if(e.key >= "0" && e.key <= "9") press(e.key);
    else if(e.key === "," || e.key === ".") press(",");
    else if(e.key === "Backspace") press("back");
    else if(e.key === "Escape") clearAll();
  });

  // ---------- fetch ----------
  function setStatus(kind, text){ $status.className = "status " + kind; $statusText.textContent = text; }
  function timeLabel(ts){ try{ return new Date(ts).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
  function saveCache(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state.rates)); }catch(e){} }
  function loadCache(){
    try{ var c = JSON.parse(localStorage.getItem(LS_KEY));
      if(c && (c.blue||c.oficial||c.mep||c.tarjeta||c.eur)){ state.rates = c; return true; } }catch(e){}
    return false;
  }
  function fetchJSON(url){ return fetch(url,{cache:"no-store"}).then(function(r){ if(!r.ok) throw 0; return r.json(); }); }
  function refresh(){
    setStatus("loading","Obteniendo cotización…");
    var keys = ["blue","oficial","mep","tarjeta","eur"];
    Promise.allSettled(keys.map(function(k){ return fetchJSON(API[k]); })).then(function(res){
      var got = false;
      res.forEach(function(r,i){ if(r.status === "fulfilled"){ state.rates[keys[i]] = r.value; got = true; } });
      if(got){
        state.rates.ts = Date.now(); saveCache();
        if(state.active !== "ars") recomputeBase();  // keep the typed foreign amount consistent
        render();
        setStatus("ok","Cotización actualizada · " + timeLabel(state.rates.ts));
      } else { useCacheOrFail(); }
    }).catch(useCacheOrFail);
  }
  function useCacheOrFail(){
    if(state.rates && (state.rates.blue||state.rates.oficial||state.rates.mep||state.rates.tarjeta||state.rates.eur)){
      render();
      setStatus("err","Sin conexión — última cotización" + (state.rates.ts ? " · " + timeLabel(state.rates.ts) : ""));
    } else { setStatus("err","No se pudo obtener la cotización"); }
  }

  // ---------- segmented control ----------
  function movePill(){
    var idx = ["blue","oficial","mep","tarjeta"].indexOf(state.rateType);
    $segPill.style.transform = "translateX(" + (idx*100) + "%)";
  }
  $seg.addEventListener("click", function(e){
    var btn = e.target.closest("button[data-rate]"); if(!btn) return;
    state.rateType = btn.getAttribute("data-rate");
    Array.prototype.forEach.call($seg.querySelectorAll("button"), function(b){ b.classList.toggle("active", b === btn); });
    haptic(6); movePill();
    if(state.active !== "ars") recomputeBase();  // same foreign amount, new market → new pesos
    render();
  });

  // ---------- block zoom gestures ----------
  document.addEventListener("gesturestart", function(e){ e.preventDefault(); }, {passive:false});
  document.addEventListener("dblclick", function(e){ e.preventDefault(); }, {passive:false});
  (function(){
    var last = 0;
    document.addEventListener("touchend", function(e){
      var now = Date.now();
      if(now - last <= 320) e.preventDefault();
      last = now;
    }, {passive:false});
  })();

  // ---------- init ----------
  applyTheme();
  movePill();
  if(loadCache() && state.rates.ts) setStatus("ok","Última cotización · " + timeLabel(state.rates.ts));
  render();
  refresh();
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) refresh(); });
  setInterval(function(){ if(!document.hidden) refresh(); }, 90000);
})();
</script>
</body>
</html>
